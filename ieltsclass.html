<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IELTS Course | LizOn Education</title>
  <style>
    :root{
      --brand: #0f4d3b;
      --brand-soft: #eef5f0;
      --text: #163126;
      --muted: #5d7066;
      --line: #dbe8df;
      --shadow: 0 10px 30px rgba(15, 77, 59, 0.08);
    }
    body{ font-family: Inter, Arial, sans-serif; background: #f7fbf8; margin: 0; color: var(--text); }
    .container{ width: min(1200px, calc(100% - 32px)); margin: 0 auto; padding: 40px 0; }
    
    /* Course Grid */
    .class-grid{ display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-bottom: 60px; }
    .class-card{ background: #fff; border-radius: 24px; border: 1px solid var(--line); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; }
    
    /* Player Area */
    .class-player{ position: relative; aspect-ratio: 16/9; background: #000; flex-shrink: 0; }
    iframe{ width: 100%; height: 100%; border: 0; }

    /* Lesson List */
    .lesson-list-container { padding: 15px; background: #fff; border-top: 1px solid var(--line); }
    .lesson-header { font-weight: 800; font-size: 14px; color: var(--brand); margin-bottom: 10px; display: flex; justify-content: space-between; }
    .lesson-scroll { max-height: 200px; overflow-y: auto; }
    .lesson-scroll::-webkit-scrollbar { width: 4px; }
    .lesson-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }

    .lesson-item { 
      display: flex; align-items: center; gap: 10px; padding: 10px; 
      border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 13px;
      border: 1px solid transparent; margin-bottom: 5px;
    }
    .lesson-item:hover { background: var(--brand-soft); border-color: var(--line); }
    .lesson-icon { width: 24px; height: 24px; background: var(--brand-soft); color: var(--brand); border-radius: 50%; display: grid; place-items: center; font-weight: 800; font-size: 11px; flex-shrink: 0; }

    /* Footer Styles from Image */
    .footer-wrapper { background: #fff; border-radius: 28px; padding: 30px; border: 1px solid var(--line); box-shadow: var(--shadow); }
    .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .footer-box { background: var(--brand-soft); border-radius: 20px; padding: 25px; }
    .footer-box h4 { margin: 0 0 10px; color: var(--brand); font-size: 20px; }
    .footer-box p { margin: 0 0 20px; font-size: 14px; color: var(--muted); line-height: 1.6; }
    .footer-btn { display: inline-block; background: #fff; color: var(--brand); padding: 10px 25px; border-radius: 999px; font-weight: 800; text-decoration: none; font-size: 14px; margin-right: 10px; border: 1px solid var(--line); }

    @media (max-width: 900px) { .class-grid, .footer-grid { grid-template-columns: 1fr; } }
  </style>
</head>

    const grid = document.getElementById("mainGrid");

    function render(){
      grid.innerHTML = courseData.map((course, courseIdx) => `

    function changeVideo(courseIdx, videoId) {
      const playerDiv = document.getElementById(`player-${courseIdx}`);

    }
