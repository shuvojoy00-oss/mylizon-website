<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LizOn Education | IELTS & PTE — Designed for Desired Score</title>
  <meta name="description" content="LizOn Education — IELTS & PTE programs, evaluation, guidance, and study abroad support. Start your journey with the right level." />
  <meta name="theme-color" content="#0b2a1f" />

<link rel="icon" type="image/png" href="assets/logo-dark.png" sizes="32x32">

  <style>
    :root{
      --bg1:#06140f;
      --bg2:#0b2a1f;
      --card:#0c2019cc;
      --card2:#0a1a1480;
      --line:#1d4a3a;
      --text:#e9f3ef;
      --muted:#b7c9c2;

      --gold:#d7b24a;
      --gold2:#b8922f;

      --soft: 0 12px 40px rgba(0,0,0,.35);
      --shadow2: 0 18px 60px rgba(0,0,0,.45);
      --radius: 22px;

      --chipBg: rgba(10,26,20,.55);
      --chipBd: rgba(29,74,58,.75);
      --focus: rgba(215,178,74,.55);

      --overlay: rgba(0,0,0,.55);

      --ask-bg: rgba(6,20,15,.88);
      --ask-panel: rgba(12,32,25,.94);
      --ask-bd: rgba(29,74,58,.75);
      --ask-bubble: rgba(255,255,255,.06);
      --ask-bubble2: rgba(215,178,74,.12);

      --surface: rgba(255,255,255,.06);
      --surface2: rgba(255,255,255,.04);
      --onGold:#142015;

      --ok: #2cffb2;
      --warn: #ffcc66;
      --danger: #ff5a5a;
      --violet: #b8a6ff;
      --sky: #7fd7ff;
    }

    html[data-theme="light"]{
      --bg1:#f5fbf8;
      --bg2:#eaf6f0;
      --card: rgba(255,255,255,.88);
      --card2: rgba(255,255,255,.72);
      --line: rgba(9,64,45,.18);
      --text:#0b1b14;
      --muted:#355247;

      --chipBg: rgba(255,255,255,.78);
      --chipBd: rgba(9,64,45,.18);

      --soft: 0 14px 40px rgba(6,20,15,.10);
      --shadow2: 0 18px 60px rgba(6,20,15,.10);

      --overlay: rgba(0,0,0,.35);

      --ask-bg: rgba(255,255,255,.88);
      --ask-panel: rgba(255,255,255,.95);
      --ask-bd: rgba(9,64,45,.18);
      --ask-bubble: rgba(9,64,45,.06);
      --ask-bubble2: rgba(215,178,74,.18);

      --surface: rgba(255,255,255,.72);
      --surface2: rgba(255,255,255,.58);
      --onGold:#142015;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 700px at 20% 0%, rgba(215,178,74,.10), transparent 60%),
        radial-gradient(1100px 700px at 80% 0%, rgba(72,255,191,.07), transparent 55%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      min-height:100vh;
      overflow-x:hidden;
    }
    a{color:inherit; text-decoration:none}

    .container{max-width:1100px; margin:0 auto; padding:22px 18px 200px}
    @media (max-width:520px){ .container{padding:18px 14px 220px} }

    /* Topbar styles... (shortened for display) */
    .topbar{ position:sticky; top:0; backdrop-filter: blur(14px); background: linear-gradient(180deg, rgba(6,20,15,.90), rgba(6,20,15,.60)); border-bottom:1px solid rgba(29,74,58,.6); z-index:50; }
    html[data-theme="light"] .topbar{ background: linear-gradient(180deg, rgba(245,251,248,.90), rgba(245,251,248,.64)); border-bottom:1px solid var(--line); }
    .topbar-inner{ max-width:1100px; margin:0 auto; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .brand{ display:flex; align-items:center; gap:10px; font-weight:900; letter-spacing:.2px; min-width:0; }
    .brand-logo{ width:38px; height:38px; border-radius:12px; padding:6px; background: var(--chipBg); border:1px solid var(--chipBd); box-shadow: 0 0 0 3px rgba(215,178,74,.10); flex:0 0 auto; }
    .brand small{ display:block; font-weight:750; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 60vw; }

    /* Button and Card styles... (shortened for display) */
    .btn{ display:inline-flex; align-items:center; justify-content:center; padding:12px 16px; border-radius:14px; border:1px solid rgba(29,74,58,.75); background: var(--chipBg); font-weight:950; letter-spacing:.2px; cursor:pointer; transition:.18s ease; text-align:center; user-select:none; gap:10px; white-space:nowrap; color: var(--text); }
    .btn.primary{ background: linear-gradient(180deg, var(--gold), var(--gold2)); color: var(--onGold); border-color: rgba(215,178,74,.85); box-shadow: 0 18px 60px rgba(215,178,74,.12); }
    .heroCard{ border-radius: var(--radius); border:1px solid rgba(29,74,58,.7); background: linear-gradient(180deg, rgba(12,32,25,.72), rgba(10,26,20,.52)); box-shadow: var(--soft); padding:22px; position:relative; overflow:hidden; }

</head>
