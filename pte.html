<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>PTE Live Full Crash Course | LizOn Education</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy:#0B1E3D;
  --gold:#F5A623;
  --white:#fff;
}

body{
  margin:0;
  font-family:'Hind Siliguri',sans-serif;
}

/* NAV */
nav{
  background:var(--navy);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
}

.logo img{height:36px;}

.nav-links{
  display:flex;
  gap:14px;
  align-items:center;
}

/* FREE RESOURCES BUTTON */
.nav-dropdown{
  position:relative;
}

.nav-dropdown-toggle{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.3);
  color:white;
  padding:8px 16px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
}

.nav-dropdown-menu{
  display:none;
  position:absolute;
  top:120%;
  left:0;
  background:white;
  border-radius:10px;
  padding:6px;
  min-width:180px;
}

.nav-dropdown-menu a{
  display:block;
  padding:10px;
  color:#333;
  text-decoration:none;
}

.nav-dropdown-menu a:hover{
  background:#f1f5f9;
}

/* CHAT BUTTON */
.nav-chat{
  background:#25D366;
  color:white;
  padding:8px 18px;
  border-radius:999px;
  text-decoration:none;
  font-weight:700;
}

/* HERO (minimal so page loads) */
.hero{
  background:linear-gradient(135deg,#0B1E3D,#1a3a6b);
  color:white;
  text-align:center;
  padding:80px 20px;
}

.hero h1{
  font-size:32px;
}

.hero span{
  color:#F5A623;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#" class="logo">
    <img src="assets/logo-dark.png" />
  </a>

  <div class="nav-links">

    <!-- FREE RESOURCES -->
    <div class="nav-dropdown">
      <button class="nav-dropdown-toggle" onclick="toggleDropdown()">
        Free Resources ▾
      </button>

      <div class="nav-dropdown-menu" id="dropdown">
        <a href="https://www.mylizon.com/pteclass.html">PTE Class</a>
        <a href="https://drive.google.com/drive/folders/18xjLim4_duxrEgKrvd1qQ_i5INGnd4hj" target="_blank">
          Notes & Resources
        </a>
      </div>
    </div>

    <!-- CHAT -->
    <a href="https://wa.me/8801611611139?text=Assalamu%20Alaikum%20LizOn%20Education.%20PTE%20course%20niye%20kotha%20bolte%20chai."
       target="_blank"
       class="nav-chat">
       Chat
    </a>

  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>PTE তে <span>৭০+</span> স্কোর<br>মাত্র <span>১ মাসে?</span></h1>
</section>

<script>
function toggleDropdown(){
  const d=document.getElementById("dropdown");
  d.style.display=d.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
