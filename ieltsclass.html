<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IELTS Full Course | LizOn Education</title>
  <style>
    /* Using your existing LizOn styles */
    :root{
      --brand: #0f4d3b;
      --brand-2: #1b6b54;
      --panel-soft: #eef5f0;
      --text: #163126;
      --muted: #5d7066;
      --line: #dbe8df;
      --shadow: 0 12px 35px rgba(15, 77, 59, 0.08);
    }
    body{ font-family: Inter, Arial; background: #f7fbf8; margin: 0; color: var(--text); }
    .container{ width: min(1200px, calc(100% - 32px)); margin: 0 auto; padding: 40px 0; }
    .class-grid{ display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
    .class-card{ background: #fff; border-radius: 24px; border: 1px solid var(--line); box-shadow: var(--shadow); overflow: hidden; }
    .class-player{ position: relative; aspect-ratio: 16/9; background: #000; }
    .thumb-overlay{ position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.4); transition: 0.3s; }
    .thumb-overlay:hover{ background: rgba(0,0,0,0.2); }
    .play-btn{ width: 70px; height: 70px; background: #fff; border-radius: 50%; display: grid; place-items: center; color: var(--brand); font-size: 24px; margin-bottom: 10px; }
    .playlist-count{ background: rgba(255,255,255,0.9); color: var(--brand); padding: 5px 12px; border-radius: 999px; font-weight: 800; font-size: 13px; }
    .class-body{ padding: 20px; }
    .class-category{ font-size: 12px; font-weight: 800; color: var(--brand); background: var(--panel-soft); padding: 5px 12px; border-radius: 999px; }
    
    @media (max-width: 850px) { .class-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="container">
    <h2 style="text-align: center; color: var(--brand); margin-bottom: 40px;">IELTS Full Playlist Course</h2>
    <div class="class-grid" id="ieltsPlaylistGrid"></div>
  </div>

  <script>
    // INSTRUCTIONS: Replace "YOUR_PLAYLIST_ID" with the actual ID from your YouTube playlists
    const ieltsPlaylists = [
      {
        title: "Listening IELTS Course",
        count: "9 Videos",
        category: "Listening",
        playlistId:  "PLCSaJreu3BqE3UG9nsCAY_KuWNQCbq0OK", // Example: PL...
        thumbVideoId: "AXphkM1DeLc" // The video ID for the cover image
      },
      {
        title: "Reading IELTS Course",
        count: "14 Videos",
        category: "Reading",
       videoId: "PLCSaJreu3BqF7bVQFOjXKOd3nxBVN4vLP", 
        thumbVideoId: "vQsm8p43Szw"
      },
      {
        title: "Speaking IELTS Course",
        count: "6 Videos",
        category: "Speaking",
        videoId: "PLCSaJreu3BqFIncUtf888CvDiN4a01aYb",
        thumbVideoId: "NOK6e-P2CEc"
      },
      {
        title: "Writing Task 1 IELTS Course",
        count: "6 Videos",
        category: "Writing",
        playlistId: "PLCSaJreu3BqEy6Oe-4jkAzsThsdC7YYOc",
        thumbVideoId: "NbaWB172i5g"
      },
      {
        title: "Writing Task 2 IELTS Course",
        count: "3 Videos",
        category: "Writing",
        playlistId: "PLCSaJreu3BqH6kbEdteT-gbGvDv35RVNE",
        thumbVideoId: "8W0PBaQbCxg"
      },
      {
        title: "GT Letter Writing IELTS Course",
        count: "1 Video",
        category: "General Training",
        playlistId: "PLCSaJreu3BqF7s2j2yiFC_hLSG810r4vR", 
        thumbVideoId: "YOUR_VIDEO_ID"
      },
      {
        title: "Extra Bonus Class IELTS Course",
        count: "3 Videos",
        category: "Bonus",
        playlistId: "PLCSaJreu3BqFZQo1iyCw5u69y71LOenji", 
        thumbVideoId: "6UFcwhzAawU"
      }
    ];

    const grid = document.getElementById("ieltsPlaylistGrid");

    function render(){
      grid.innerHTML = ieltsPlaylists.map((item, index) => `
        <article class="class-card">
          <div class="class-player" id="playlist-player-${index}">
            <img src="https://i.ytimg.com/vi/${item.thumbVideoId}/hqdefault.jpg" style="width:100%; height:100%; object-fit:cover;">
            <div class="thumb-overlay" onclick="loadPlaylist(${index}, '${item.playlistId}')">
              <div class="play-btn">▶</div>
              <div class="playlist-count">View All ${item.count}</div>
            </div>
          </div>
          <div class="class-body">
            <span class="class-category">${item.category}</span>
            <h3 style="margin:12px 0 5px;">${item.title}</h3>
            <p style="margin:0; font-size:14px; color:var(--muted);">Click to watch the full series inside the site.</p>
          </div>
        </article>
      `).join("");
    }

    function loadPlaylist(index, playlistId) {
      const container = document.getElementById(`playlist-player-${index}`);
      // This loads the playlist UI so users can click through all videos
      container.innerHTML = `
        <iframe 
          width="100%" 
          height="100%" 
          src="https://www.youtube-nocookie.com/embed?listType=playlist&list=${playlistId}&autoplay=1" 
          frameborder="0" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
          allowfullscreen>
        </iframe>`;
    }


    <footer style="padding: 40px 0 100px;">
    <div class="container">
      <div class="footer-card" style="background: rgba(255,255,255,0.92); border: 1px solid rgba(15,77,59,0.08); border-radius: 28px; box-shadow: var(--shadow); padding: 24px;">
        <div class="footer-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 18px;">
          
          <div class="footer-box" style="background: var(--panel-soft); border: 1px solid var(--line); border-radius: 22px; padding: 20px;">
            <h4 style="margin: 0 0 10px; font-size: 22px; color: var(--brand);">Contact & Location</h4>
            <p style="margin: 0; color: var(--muted); line-height: 1.8; font-size: 15px;">
              LizOn Education<br>
              51, Budhha Mandir Basabo (Beside Morning Bell School & Brac office), Dhaka 1214
            </p>

            <div class="footer-actions" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px;">
              <a class="footer-link" href="https://maps.app.goo.gl/JC9sikzCiSsQrNnH9" target="_blank" style="display: inline-flex; align-items: center; justify-content: center; padding: 12px 18px; border-radius: 999px; background: #fff; border: 1px solid var(--line); color: var(--brand); font-size: 13px; font-weight: 800;">
                Open Map
              </a>
              <a class="footer-link" href="https://wa.me/8801611611139" target="_blank" style="display: inline-flex; align-items: center; justify-content: center; padding: 12px 18px; border-radius: 999px; background: #fff; border: 1px solid var(--line); color: var(--brand); font-size: 13px; font-weight: 800;">
                WhatsApp
              </a>
            </div>
          </div>

          <div class="footer-box" style="background: var(--panel-soft); border: 1px solid var(--line); border-radius: 22px; padding: 20px;">
            <h4 style="margin: 0 0 10px; font-size: 22px; color: var(--brand);">LizOn Education</h4>
            <p style="margin: 0; color: var(--muted); line-height: 1.8; font-size: 15px;">
              Learn your IELTS classes directly inside the site and get proper guidance when you are ready to join the full course.
            </p>

            <div class="footer-actions" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px;">
              <a class="footer-link" href="https://www.facebook.com/" target="_blank" style="display: inline-flex; align-items: center; justify-content: center; padding: 12px 18px; border-radius: 999px; background: #fff; border: 1px solid var(--line); color: var(--brand); font-size: 13px; font-weight: 800;">
                Facebook
              </a>
              <a class="footer-link" href="https://www.youtube.com/" target="_blank" style="display: inline-flex; align-items: center; justify-content: center; padding: 12px 18px; border-radius: 999px; background: #fff; border: 1px solid var(--line); color: var(--brand); font-size: 13px; font-weight: 800;">
                YouTube
              </a>
              <a class="footer-link" href="https://www.linkedin.com/" target="_blank" style="display: inline-flex; align-items: center; justify-content: center; padding: 12px 18px; border-radius: 999px; background: #fff; border: 1px solid var(--line); color: var(--brand); font-size: 13px; font-weight: 800;">
                LinkedIn
              </a>
            </div>
          </div>

        </div>
      </div>
    </div>
  </footer>
    render();
  </script>
</body>
</html>
